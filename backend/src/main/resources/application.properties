server.port=${PORT:8080}
spring.application.name=roleledger-backend

# Local MySQL — change username/password to match your local MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/roleledger?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT — must be at least 32 characters
jwt.secret=RoleLedgerSuperSecretKeyForJWT2024!MustBe32Chars

# Gemini AI — replace with your real key from aistudio.google.com
gemini.api.key=YOUR_GEMINI_API_KEY_HERE
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# CORS — frontend URL
cors.allowed-origins=http://localhost:3000